<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>THE ATTENDANCE CHAMBER</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- START SCREEN (NEW) -->
    <div id="startScreen">
        <button id="startBtn">⚔️ ENTER THE CONTINENTAL</button>
    </div>

    <!-- Background Music (FIXED) -->
    <audio id="bg-music" loop>
        <source src="assets/music/got.mp3" type="audio/mp3">
    </audio>

    <!-- Header -->
    <header>
        <h1>THE ATTENDANCE CHAMBER</h1>
        <p>Know your fate before skipping a class</p>
    </header>

    <!-- Main Form -->
    <div class="container">

        <form id="attendanceForm">

            <label>Lecture Type</label>
            <select id="type">
                <option value="theory">Theory (1 hr)</option>
                <option value="lab">Lab (2 hr)</option>
            </select>

            <label>Current Attendance (%)</label>
            <input type="number" id="attendance" required>

            <label>Total Lectures Conducted</label>
            <input type="number" id="total" required>

            <label>Lectures Attended</label>
            <input type="number" id="attended" required>

            <label>Total Lectures in Semester</label>
            <input type="number" id="semester" required>

            <button type="submit">Calculate My Fate</button>
        </form>

    </div>

    <!-- Loading Screen -->
    <div id="loading" class="hidden">
        <h2>The HIGH TABLE is calculating your fate...</h2>
        <div id="inputSummary"></div>
    </div>

    <!-- Result Section -->
    <div id="result" class="hidden">
        <div class="card">
            <h3>Your Fate</h3>
            <p id="resultType"></p>
            <p id="mustAttend"></p>
            <p id="canSkip"></p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
